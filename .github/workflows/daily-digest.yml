name: Daily Digest

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Send digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          ALLOWED_AUTHOR: ${{ secrets.ALLOWED_AUTHOR }}
          # Non-secret config with defaults; override by editing values or using repository variables.
          RSS_URL: "https://www.businesstimes.com.sg/rss/singapore"
          LOOKBACK_HOURS: "24"
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          BRIEF_SUBJECT: "Business Times Daily Digest"
        run: python -m bt_brief.main
